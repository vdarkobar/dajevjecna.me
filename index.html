<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da je vječna Crna Gora</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/vdarkobar/media/main/dajevjecna/Grb-Crne-Gore.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: black;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        img {
            animation: fadeIn 1.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        #play-button {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
        }
        #play-button:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        #play-button.playing {
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70%  { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        #play-button svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="play-button" aria-label="Play/Pause">
            <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <audio id="background-audio" loop>
            <source src="https://github.com/vdarkobar/media/blob/main/dajevjecna/Crnogorska%20himna%20-%20National%20Anthem%20of%20Montenegro.mp3?raw=true" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <img src="https://github.com/vdarkobar/media/blob/main/dajevjecna/montenegro-flag.jpg?raw=true" alt="Da je vječna Crna Gora">
    </div>

    <script>
        const audio = document.getElementById('background-audio');
        const playButton = document.getElementById('play-button');

        const iconPlay  = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');

        function updateButton() {
            const playing = !audio.paused;
            iconPlay.style.display  = playing ? 'none'  : 'block';
            iconPause.style.display = playing ? 'block' : 'none';
            playButton.classList.toggle('playing', playing);
        }

        playButton.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        });

        audio.addEventListener('play',  updateButton);
        audio.addEventListener('pause', updateButton);
    </script>
</body>
</html>
